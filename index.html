<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>青海喫茶｜レトロな純喫茶</title>
  <meta name="description" content="青海喫茶は落ち着いた空間でコーヒーを楽しめる純喫茶です">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="site-header">
    <div class="header-hours">OPEN 10:00 - 19:00 (CLOSED TUE)</div>
    <div class="site-logo">青海喫茶</div>
    <a href="#menu" class="nav-link">メニュー</a>
  </header>

  <section class="hero">
    <div class="slider">
      <img src="assets/hero1.jpg" alt="青海喫茶 ヒーロー1" class="active">
      <img src="assets/hero2.jpg" alt="青海喫茶 ヒーロー2">
      <img src="assets/hero3.jpg" alt="青海喫茶 ヒーロー3">
      <img src="assets/hero4.jpg" alt="青海喫茶 ヒーロー4">
    </div>
  </section>

  <section class="padded-section container fade">
    <h2 class="concept-title">SINCE 2000</h2>
    <p class="concept-text">
      静かな海風を感じる場所に、青海喫茶はひっそりと佇んでいます。<br>
      昭和の面影を残す落ち着いた空間で、こだわりの自家焙煎珈琲とともに<br>
      穏やかな時間をお過ごしください。<br><br>
    </p>

    <div class="image-section">
      <img src="https://picsum.photos/id/1060/800/800" alt="本格珈琲">
    </div>
  </section>

  <section id="menu" class="menu-banner fade">
    <div class="menu-overlay"></div>
    <a href="#" class="btn-transparent">メニューはこちら</a>
  </section>

  <section class="contact-section">
    <div class="info-block fade">
      <div class="info-overlay"></div>
      <div class="info-content">
        <h3 class="info-title">STORE INFO</h3>
        <p class="info-item">営業時間：10:00 〜 19:00</p>
        <p class="info-item">定休日：毎週火曜日・第2水曜日</p>
        <p class="info-item">住所：〒000-0000 北海道札幌市中央区1-2-3</p>
        <p class="info-item">TEL：011-000-0000
        </p>
      </div>
    </div>

    <div class="form-block fade">
      <h3 class="info-title form-title">CONTACT</h3>
      <form action="#" method="POST">
        <div class="form-group">
          <label>お名前</label>
          <input type="text" required>
        </div>
        <div class="form-group">
          <label>メールアドレス</label>
          <input type="email" required>
        </div>
        <div class="form-group">
          <label>電話番号</label>
          <input type="tel">
        </div>
        <div class="form-group">
          <label>件名</label>
          <input type="text" required>
        </div>
        <div class="form-group">
          <label>内容</label>
          <textarea rows="5" required></textarea>
        </div>
        <button type="submit" class="btn-submit">送信する</button>
      </form>
    </div>
  </section>

  <div class="map-wrapper fade">
    <iframe
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2915.2530379294245!2d141.35086881548177!3d43.05662137914619!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x5f0b29868e7af2c5%3A0x1d217937ceea7ee!2sOdori%20Park!5e0!3m2!1sen!2sjp!4v1680196232537!5m2!1sen!2sjp"
      allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
  </div>

  <footer class="site-footer">
    <p>&copy; 青海喫茶 All Rights Reserved.</p>
  </footer>

  <script src="main.js"></script>
</body>

</html>
